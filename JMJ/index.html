    <p>Salve Regina,</p>
    <p>Mater misericordiae, vita, dulcedo et spes nostra, salve!</p>
    <p>Ad te clamamus, exsules filii Evae.</p>
    <p>Ad te suspiramus, gementes et flentes in hac lacrimarum valle.</p>
